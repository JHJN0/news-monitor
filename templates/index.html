<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 모니터링</title>
<style>
  body { font-family: 'Malgun Gothic', sans-serif; max-width: 860px; margin: 0 auto; padding: 24px; background: #f7f8fa; color: #222; }
  h1 { font-size: 1.4rem; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar form { display: inline; }
  select, button { padding: 6px 12px; font-size: 0.95rem; border-radius: 6px; border: 1px solid #ccc; }
  button.collect { background: #2563eb; color: #fff; border: none; cursor: pointer; }
  button.collect:hover { background: #1d4ed8; }
  ul.articles { list-style: none; padding: 0; }
  ul.articles li { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
  ul.articles a { color: #111; text-decoration: none; font-weight: 600; }
  ul.articles a:hover { text-decoration: underline; }
  .meta { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
  .meta .kw { background: #eef2ff; color: #4338ca; padding: 1px 8px; border-radius: 999px; margin-right: 6px; }
  .empty { color: #6b7280; }
  nav.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  nav.tabs a { padding: 8px 16px; border-radius: 8px 8px 0 0; text-decoration: none; color: #6b7280; border: 1px solid transparent; }
  nav.tabs a.active { background: #fff; color: #111; font-weight: 600; border: 1px solid #e5e7eb; border-bottom-color: #fff; }
</style>
</head>
<body>
  <h1>📰 뉴스 모니터링</h1>
  <nav class="tabs">
    <a href="{{ url_for('index') }}" class="active">뉴스</a>
    <a href="{{ url_for('notices') }}">공고</a>
  </nav>
  <div class="toolbar">
    <form method="post" action="{{ url_for('collect') }}">
      <input type="hidden" name="keyword" value="{{ selected }}">
      <button type="submit" class="collect">지금 수집</button>
    </form>
    <form method="get" action="{{ url_for('index') }}">
      <select name="keyword" onchange="this.form.submit()">
        <option value="">전체 키워드</option>
        {% for kw in keywords %}
        <option value="{{ kw }}" {% if kw == selected %}selected{% endif %}>{{ kw }}</option>
        {% endfor %}
      </select>
    </form>
    <span>총 {{ articles|length }}건</span>
  </div>

  {% if articles %}
  <ul class="articles">
    {% for a in articles %}
    <li>
      <a href="{{ a['link'] }}" target="_blank" rel="noopener">{{ a['title'] }}</a>
      <div class="meta">
        <span class="kw">{{ a['keyword'] }}</span>
        {{ a['source'] or '언론사 미상' }} · {{ a['pub_date'] }}
      </div>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">저장된 기사가 없습니다. 상단의 "지금 수집" 버튼을 눌러주세요.</p>
  {% endif %}
</body>
</html>
