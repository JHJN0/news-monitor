<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ notice['title'] }} - 뉴스 모니터링</title>
<style>
  body { font-family: 'Malgun Gothic', sans-serif; max-width: 860px; margin: 0 auto; padding: 24px; background: #f7f8fa; color: #222; }
  h1 { font-size: 1.4rem; }
  .back { display: inline-block; margin-bottom: 12px; color: #2563eb; text-decoration: none; }
  .back:hover { text-decoration: underline; }
  .meta { font-size: 0.82rem; color: #6b7280; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  button.copy { padding: 4px 10px; font-size: 0.8rem; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
  button.copy:hover { background: #eef2ff; }
  .notice-body { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; overflow-x: auto; }
  .notice-body .notice-page { margin-bottom: 24px; border-bottom: 1px dashed #e5e7eb; padding-bottom: 24px; }
  .notice-body .notice-page:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
  .notice-body img { max-width: 100%; height: auto; }
</style>
</head>
<body>
  <a class="back" href="{{ url_for('notices') }}">← 공고 목록으로</a>
  <h1>{{ notice['title'] }}</h1>
  <div class="meta">
    <span>원본 파일: {{ notice['orig_name'] }}</span>
    <button type="button" class="copy" onclick="copyHtml(this)">HTML 복사</button>
  </div>
  <div class="notice-body">
    {{ notice['html']|safe }}
  </div>
  <textarea id="raw-html" style="display:none">{{ notice['html'] }}</textarea>
  <script>
    function copyHtml(btn) {
      navigator.clipboard.writeText(document.getElementById('raw-html').value)
        .then(function () {
          btn.textContent = '복사됨!';
          setTimeout(function () { btn.textContent = 'HTML 복사'; }, 1500);
        });
    }
  </script>
</body>
</html>
